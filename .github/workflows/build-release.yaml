name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
        default: "0.1.0"

env:
  REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
  PROJECT: ${{ secrets.HARBOR_PROJECT }}
  IMAGE_NAME: mcp-music-server

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
    steps:
      - id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
            echo "version=$V" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  build-amd64:
    name: Build amd64
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64

      - name: Save image for offline release
        if: needs.version.outputs.is_tag == 'true'
        run: |
          docker pull --platform linux/amd64 \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64
          docker save \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-amd64 \
            | gzip > ${{ env.IMAGE_NAME }}-amd64.tar.gz

      - name: Upload amd64 artifact
        if: needs.version.outputs.is_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-amd64
          path: ${{ env.IMAGE_NAME }}-amd64.tar.gz
          retention-days: 1

  build-arm64:
    name: Build arm64
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64

      - name: Save image for offline release
        if: needs.version.outputs.is_tag == 'true'
        run: |
          docker pull --platform linux/arm64 \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64
          docker save \
            ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:${{ needs.version.outputs.version }}-arm64 \
            | gzip > ${{ env.IMAGE_NAME }}-arm64.tar.gz

      - name: Upload arm64 artifact
        if: needs.version.outputs.is_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: image-arm64
          path: ${{ env.IMAGE_NAME }}-arm64.tar.gz
          retention-days: 1

  manifest:
    name: Create multi-arch manifest
    runs-on: ubuntu-latest
    needs:
      - version
      - build-amd64
      - build-arm64
    steps:
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push manifests
        run: |
          V="${{ needs.version.outputs.version }}"
          BASE="${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}"

          docker buildx imagetools create \
            --tag "${BASE}:${V}" \
            "${BASE}:${V}-amd64" \
            "${BASE}:${V}-arm64"

          docker buildx imagetools create \
            --tag "${BASE}:latest" \
            "${BASE}:${V}-amd64" \
            "${BASE}:${V}-arm64"

          echo "Manifest ${BASE}:${V} and ${BASE}:latest created"

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-amd64
      - build-arm64
      - manifest
    if: needs.version.outputs.is_tag == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 image
        uses: actions/download-artifact@v4
        with:
          name: image-amd64
          path: release

      - name: Download arm64 image
        uses: actions/download-artifact@v4
        with:
          name: image-arm64
          path: release

      - name: Prepare release files
        run: |
          cp docker-compose.yaml release/
          cp .env.example release/
          cd release
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('v{0}', needs.version.outputs.version) }}
          name: "MCP Music Server v${{ needs.version.outputs.version }}"
          generate_release_notes: true
          body: |
            ## MCP Music Server v${{ needs.version.outputs.version }}

            ### 在线部署（从 Harbor 拉取）

            ```bash
            docker login ${{ env.REGISTRY }}
            docker pull ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:v${{ needs.version.outputs.version }}
            ```

            编辑 `.env`：
            ```bash
            MCP_IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:v${{ needs.version.outputs.version }}
            ```

            然后运行 `docker-compose up -d`。

            ### 离线部署

            ```bash
            gunzip -c ${{ env.IMAGE_NAME }}-amd64.tar.gz | docker load
            MCP_IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ env.IMAGE_NAME }}:v${{ needs.version.outputs.version }} docker-compose up -d
            ```

            ### MCP 客户端配置

            ```json
            {
              "mcpServers": {
                "music": {
                  "url": "http://<your-server>:8090/sse"
                }
              }
            }
            ```

            ### 可用 MCP 工具
            `music_search` `music_get_song` `music_get_play_url` `music_get_lyrics`
            `music_get_playlist` `music_get_hot_playlists` `music_play` `music_stop`
            `music_pause` `music_resume` `music_get_playback_state` `music_get_platform_status`

            ### 校验
            ```bash
            sha256sum -c checksums.txt
            ```

          files: |
            release/*
